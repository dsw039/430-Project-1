<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1 Books</title>
    <link rel="stylesheet" type="text/css" href="/style.css">

    <script>
        const handleResponse = async (response) => {

            const content = document.querySelector('#content');

            switch (response.status) {
                case 200: //success
                    content.innerHTML = `<b>Success</b>`;
                    break;
                case 201: //created
                    content.innerHTML = '<b>Created</b>';
                    break;
                case 204: //updated (no response back from server)
                    content.innerHTML = '<b>Updated (No Content)</b>';
                    return;
                case 400: //bad request
                    content.innerHTML = `<b>Bad Request</b>`;
                    break;
                default: //any other status code
                    content.innerHTML = `Error code not implemented by client.`;
                    break;
            }

            const obj = await response.json();

            if (obj.message) {
                content.innerHTML += `<p>${obj.message}</p>`;
            }
        };

        const sendPost = async (nameForm) => {
            //Grab all the info from the form
            const url = nameForm.getAttribute('action');
            const method = nameForm.getAttribute('method');

            const title = nameForm.querySelector('#titleField').value;
            const author = nameForm.querySelector('#authorField').value;
            const dataType = nameForm.querySelector('#dataType').value;

            //Build a data string in the FORM-URLENCODED format.
            let formData = `title=${title}&age=${author}`;

            //If the user selected JSON, send that instead
            if (dataType === 'application/json') {
                formData = JSON.stringify({ title, author });
            }

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': dataType,
                    'Content-Length': formData.length,
                    'Accept': 'application/json',
                },
                body: formData,
            });

            handleResponse(response);
        };

        const init = () => {
            //Grab the form
            const nameForm = document.querySelector('#nameForm');

            //Create an addUser function that cancels the forms default action and
            //calls our sendPost function above.
            const addBook = (e) => {
                e.preventDefault();
                sendPost(nameForm);
                return false;
            }

            nameForm.addEventListener('submit', addBook);
        };

        window.onload = init;
    </script>
</head>

<body>
<section id="top">
    <h3>Book-Project-Milestone</h3>
    <form id="nameForm" action="/addBook" method="post">
      <label for="title">title: </label>
      <input id="nameField" type="text" name="title" />
      <label for="author">Author: </label>
      <input id="authorField" type="text" name="author" min="0" max="100" step="1"/>
      <select name="dataType" id="dataType">
        <option value="application/x-www-form-urlencoded">URL Encoded</option>
        <option value="application/json">JSON</option>
      </select>
      <input type="submit" value="Add Book" />
    </form>
    <p>Go to <a href="/getBooks">/getBooks</a> to see books.</p>
    <p>Go to <a href="/getBook">/getBook</a> to see books with a  title filter</a></p>
  </section>
  <section id="content">
  </section>
</body>

</html>
